spring.application.name=eduo
###########################################
############ BEGIN DATABASE ###############
###########################################
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
    #secrets
spring.datasource.url=${DB_URL}
# ENSURE SCHEMA EXISTS FIRST, WE WANT TO OFFLOAD AS MUCH MANUAL WORK AS POSSIBLE FROM END USER TO AVOID ERRORS.
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS eduo

spring.jpa.properties.hibernate.default_schema=eduo
# this is necessary to avoid "relation not found" errors, because the tables are created in the eduo schema, but without this line, hibernate looks for them in the default public schema
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
#spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
    #postgres specific steps i'm told, unnecessary claims the log. kept for now

spring.jpa.hibernate.ddl-auto=update
    # use update for dev (makes db match entity classes if different)
    # use validate for prod (throws error if db schema doesn't match app entities)
    # create (dangerous!) drops tables then recreates. all data lost
spring.jpa.defer-datasource-initialization=true
    # waits to run sql inserts(data.sql) until after tables are initialized by hibernate
spring.jpa.show-sql=true
    # shows sql in log
spring.sql.init.separator=;;
    # causes pains in the data.sql init script if not included (dollar signs confuse the script runner regarding semicolons)
spring.sql.init.mode=always
    # runs some initialization intended for in-memory dbs, in this case to fill the db with test data
    # data.sql checks if a specific user exists and aborts to not generate duplicates, because these are not checked currently
###########################################
############# END DATABASE ################
###########################################

###########################################
# Springdoc ###############################
###########################################
# Enable the raw OpenAPI spec endpoint
springdoc.api-docs.enabled=true

# Enable Swagger UI
springdoc.swagger-ui.enabled=true

# Optional: where Swagger UI lives (this is the default)
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.web=DEBUG

### ACTIVATE PROFILES HERE:
