###########################################
##### BEGIN OLLAMA CONFIG #################
###########################################

ollama.base-url=http://localhost:11434

# Can be changed to change model, see what Docker supports first if you want to change outside these.
# NOTE: if you change the default model here, keep the infra docs/scripts in sync.

# >>>> ALTERNATIVES TO CHOOSE: UNCOMMENT ONE OF THESE AND COMMENT OUT THE OTHERS TO SELECT <<<<
## (recommended default for quality/resource match) More powerful but also more resource intensive:
### URL: https://ollama.com/library/qwen2.5%3A7b
### Disk: ~4.7 GB
### Context: 32K in Ollama tag list, model family supports up to 128K depending on variant/settings
### Recommended RAM/VRAM: 8-12 GB minimum, 16 GB system RAM recommended for CPU
 ollama.model=qwen2.5:7b

## (recommended if your machine can handle it) Even more powerful but also more resource intensive:
### URL:  https://ollama.com/library/llama3.1%3A8b
### Disk: ~4.9 GB
### Context: 128K
### Recommended RAM/VRAM: 10-16 GB, 16 GB+ system RAM recommended for CPU
# ollama.model=llama3.1:8b

## (easy fallback if mediocre machine) Useful but less resource intensive:
# URL: https://ollama.com/library/gemma3%3A4b
### Disk: ~3.3 GB
### Context: 128K
### Recommended RAM/VRAM: 6-10 GB, 8-16 GB system RAM recommended for CPU
# ollama.model=gemma:4b

## (only for testing or bare proof of concept) Very lightweight but also very limited:
### URL: https://ollama.com/library/gemma2%3A2b
### Disk: ~1.7 GB
### Context: 8K
### Recommended RAM/VRAM: 4-6 GB, 8 GB system RAM recommended for CPU
#ollama.model=gemma:2b



# Set to false if you do not want autotest at app startup (currently unused)
ollama.test-on-startup=true

###########################################
##### END OLLAMA CONFIG ###################
###########################################